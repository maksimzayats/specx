[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
priority = 0

[[repos.hooks]]
id = "end-of-file-fixer"
priority = 10

[[repos.hooks]]
id = "check-yaml"
priority = 30

[[repos.hooks]]
id = "check-json"
priority = 30

[[repos.hooks]]
id = "check-toml"
priority = 30

[[repos.hooks]]
id = "check-added-large-files"
priority = 30

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.9.24"

[[repos.hooks]]
id = "uv-lock"
priority = 20

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff check fix"
alias = "ruff-check-fix"
language = "system"
entry = "uv run ruff check --fix-only ."
stages = ["manual"]
pass_filenames = false
priority = 20

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
alias = "ruff-format-fix"
language = "system"
entry = "uv run ruff format ."
stages = ["manual"]
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "ruff-format"
name = "ruff format check"
alias = "ruff-format-check"
language = "system"
entry = "uv run ruff format --check ."
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^ruff\\.toml$|^prek\\.toml$|^uv\\.lock$"
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
language = "system"
entry = "uv run ruff check ."
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^ruff\\.toml$|^prek\\.toml$|^uv\\.lock$"
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "mypy"
name = "mypy"
language = "system"
entry = "uv run --env-file .env.test.example mypy src/ management/ tests/"
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^prek\\.toml$|^uv\\.lock$|^\\.env\\.test\\.example$"
pass_filenames = false
priority = 30
