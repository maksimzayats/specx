[flake8]
format = wemake
show-source = true
statistics = false
doctests = true

max-complexity = 6
max-line-length = 100
max-imports = 17
max-arguments = 6
allowed-domain-names = data

select = WPS,E999

extend-exclude =
  .venv
  htmlcov
  site

per-file-ignores =
  # The dependency updater is an operational script that parses multiple external
  # metadata formats; keep WPS active, but avoid splitting it into fake modules.
  management/dependency_updater.py:
    WPS110,
    WPS201,
    WPS202,
    WPS204,
    WPS210,
    WPS221,
    WPS226,
    WPS231,
    WPS237,
    WPS301,
    WPS335,
    WPS336,
    WPS347,
    WPS363,
    WPS407,
    WPS430,
    WPS504
  # Exception contracts are intentionally uppercase class attributes.
  src/fastapi_template/core/**/repositories.py:
    WPS115
  src/fastapi_template/core/**/services/*.py:
    WPS115
  src/fastapi_template/core/**/services.py:
    WPS115
  src/fastapi_template/core/**/use_cases.py:
    WPS115
  src/fastapi_template/core/shared/delivery/fastapi/request.py:
    WPS115
  src/fastapi_template/core/health/use_cases.py:
    WPS111,
    WPS115
  # Delivery adapters translate framework exceptions and can have compact
  # exception-heavy control flow.
  src/fastapi_template/core/**/delivery/fastapi/*.py:
    WPS217,
    WPS238
  # Dataclass lifecycle hooks are intentionally paired with callable factories.
  src/fastapi_template/infrastructure/throttled/throttler.py:
    WPS338
