x-common: &common
  image: base:local

  env_file:
    - ../.env

  environment:
    DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}"
    AWS_S3_ENDPOINT_URL: "http://minio:9000"
    REDIS_URL: "redis://default:${REDIS_PASSWORD}@redis:6379/0"

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  networks:
    - main

services:
  base:
    image: base:local
    build:
      context: ..
      dockerfile: docker/Dockerfile

  api:
    <<: *common
    ports:
      - "8009:8000"
    command:
      - gunicorn
      - modern_python_template.entrypoints.fastapi.app:app
      - --workers=4
      - --worker-class=uvicorn.workers.UvicornWorker
      - --bind=0.0.0.0:8000
      - --timeout=120
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      collectstatic:
        condition: service_completed_successfully
      celery-worker:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=8).read()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  celery-worker:
    <<: *common
    command:
      - celery
      - --app=modern_python_template.entrypoints.celery.app
      - worker
      - --loglevel=${LOGGING_LEVEL:-INFO}
      - --concurrency=4
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: always

  celery-beat:
    <<: *common
    command:
      - celery
      - --app=modern_python_template.entrypoints.celery.app
      - beat
      - --loglevel=${LOGGING_LEVEL:-INFO}
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: always

  migrations:
    <<: *common
    command: python management/manage.py migrate --noinput
    depends_on:
      pgbouncer:
        condition: service_healthy

  collectstatic:
    <<: *common
    command: python management/manage.py collectstatic --noinput
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully

  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - main

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Connection pooling settings
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      # Session cleanup
      SERVER_RESET_QUERY: DISCARD ALL
      # Connection management
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      # Logging
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1
      # Auth
      AUTH_TYPE: scram-sha-256
      # Admin access (for monitoring)
      ADMIN_USERS: ${POSTGRES_USER}
      STATS_USERS: ${POSTGRES_USER}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - main
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.6.2
    restart: unless-stopped
    env_file:
      - ../.env
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - main

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 2s
      timeout: 10s
      retries: 5
    networks:
      - main

  minio-create-buckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set my-minio http://minio:9000 \"$${AWS_S3_ACCESS_KEY_ID}\" \"$${AWS_S3_SECRET_ACCESS_KEY}\";
      /usr/bin/mc mb --ignore-existing \"my-minio/$${AWS_S3_PROTECTED_BUCKET_NAME:-protected}\";
      /usr/bin/mc anonymous set none \"my-minio/$${AWS_S3_PROTECTED_BUCKET_NAME:-protected}\";

      /usr/bin/mc mb --ignore-existing \"my-minio/$${AWS_S3_PUBLIC_BUCKET_NAME:-public}\";
      /usr/bin/mc anonymous set public \"my-minio/$${AWS_S3_PUBLIC_BUCKET_NAME:-public}\";

      exit 0;
      "
    networks:
      - main

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  main:
    driver: bridge
