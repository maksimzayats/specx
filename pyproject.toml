[project]
name = "fastdjango"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "a2wsgi>=1.10.10",
    "annotated-types>=0.7.0",
    "boto3>=1.43.23",
    "cachetools>=7.1.4",
    "celery>=5.6.3",
    "celery-types>=0.26.0",
    "colorlog>=6.10.1",
    "diwire>=1.4.1",
    "dj-database-url>=3.1.2",
    "django>=6.0.6",
    "django-storages[s3]>=1.14.6",
    "django-stubs[compatible-mypy]>=6.0.5",
    "fastapi>=0.136.3",
    "gunicorn>=26.0.0",
    "httpx>=0.28.1",
    "logfire[fastapi, django, celery, requests, psycopg, httpx, redis]>=4.35.0",
    "psycopg[binary]>=3.3.4",
    "pydantic-settings>=2.14.1",
    "pydantic[email]>=2.13.4",
    "pyjwt>=2.13.0",
    "python-dotenv>=1.2.2",
    "redis>=8.0.0",
    "throttled-py>=3.3.1",
    "uvicorn[standard]>=0.49.0",
    "watchdog[watchmedo]>=6.0.0",
    "whitenoise>=6.12.0",
]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "prek>=0.4.4",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "pytest-django>=4.12.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.16",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.7.6",
]
setup = [
    "libcst>=1.8.6",
    "questionary>=2.1.1",
    "rich>=15.0.0",
    "ruamel.yaml>=0.19.1",
    "tomlkit>=0.15.0",
]

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"

[tool.mypy]
python_version = "3.14"
strict = true
plugins = ["mypy_django_plugin.main", "diwire.integrations.mypy_plugin"]
ignore_missing_imports = true
local_partial_types = true
warn_unreachable = true
enable_error_code = [
    "truthy-bool",
    "truthy-iterable",
    "redundant-expr",
    "unused-awaitable",
    "ignore-without-code",
    "possibly-undefined",
    "redundant-self",
    "unimported-reveal",
    "deprecated",
    "exhaustive-match",
]
disable_error_code = [
    "no-any-return",
]

[[tool.mypy.overrides]]
module = "fastdjango.*.migrations.*"
disable_error_code = ["no-untyped-def"]

[tool.django-stubs]
django_settings_module = "fastdjango.infrastructure.django.settings"

[tool.logfire]
ignore_no_config = true

[tool.pytest.ini_options]
minversion = "9.0"
addopts = "--reuse-db --create-db --exitfirst -vv --cov=src --cov-report=html --cov-fail-under=80"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    # Entry points
    "management/manage.py",
    "src/fastdjango/entrypoints/fastapi/app.py",
    "src/fastdjango/entrypoints/celery/app.py",
    # Import-time framework settings
    "src/fastdjango/infrastructure/django/settings.py",
    # Django admin (requires manual testing)
    "src/**/admin.py",
    # Observability/telemetry (requires external services)
    "src/**/logfire/**",
]

[tool.coverage.report]
exclude_also = [
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "@abstractmethod",
    "if TYPE_CHECKING:",
    "@overload",
    "class .*\\bProtocol\\):",
    "^\\s*pass$",
    "^\\s*\\.\\.\\.$",
]
skip_empty = true
